version: "3.8"

services:
  product-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - product-db
    networks:
      - productnet

  product-db:
    image: postgres:14
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - productdata:/var/lib/postgresql/data
    networks:
      - productnet

volumes:
  productdata:

networks:
  productnet:
