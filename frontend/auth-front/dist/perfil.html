<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil - ECOMVIDA</title>
  <link rel="stylesheet" href="estilos/base.css">
</head>
<body>
  <div class="container">
    <h2>Mi Perfil</h2>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="apellido" placeholder="Apellido">
    <input type="email" id="correo" placeholder="Correo">
    <input type="text" id="numero" placeholder="Número telefónico">
    <button onclick="guardarPerfil()">Guardar Cambios</button>

    <h2>Dirección</h2>
    <input type="text" id="calle" placeholder="Calle">
    <input type="text" id="ciudad" placeholder="Ciudad">
    <input type="text" id="provincia" placeholder="Provincia">
    <input type="text" id="codigo_postal" placeholder="Código Postal">
    <button onclick="guardarDireccion()">Guardar Dirección</button>
  </div>
  <script src="js/perfil.js"></script>
  <script src="js/direccion.js"></script>
</body>
</html>
