name: CI - Order-Service

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]


jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: orderdb
          POSTGRES_USER: ${{ secrets.ORDER_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.ORDER_DB_PASS }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Build with Maven
        working-directory: pedidos/order-service
        run: ./mvnw clean package -DskipTests

      - name: Docker Build
        working-directory: pedidos/order-service
        run: docker build -t order-service .
