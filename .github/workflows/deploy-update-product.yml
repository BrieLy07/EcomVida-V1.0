name: Deploy updateProductService to EC2

on:
  push:
    branches:
      - test2.0
    paths:
      - 'backend/product_domain/catalogService/updateProduct/**'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd backend/product_domain/catalogService/updateProduct
          npm install

      - name: Run Jest tests
        run: |
          cd backend/product_domain/catalogService/updateProduct
          npm test

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t brielys/update-product-service:latest ./backend/product_domain/catalogService/updateProduct

      - name: Push Docker image
        run: |
          docker push brielys/update-product-service:latest

  deploy-qa:
    name: Deploy to QA 
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/test2.0'

    steps:
      - name: Deploy to QA via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_PRODUCT_DOMAIN_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_PRODUCT_DOMAIN_PEM_KEY }}
          script: |
            cd EcomVida-V1.0/backend/product_domain/catalogService/updateProduct
            docker pull brielys/update-product-service:latest
            docker stop update-product-service || true
            docker rm update-product-service || true
            docker run -d --restart=always --name update-product-service -p 3013:3000 --env-file .env brielys/update-product-service:latest
