name: CI - Product Variant Service

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27028:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=5

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Crear archivo .env
        working-directory: productos/product-variant-service
        run: |
          echo "MONGO_URI=${{ secrets.VARIANT_MONGO_URI }}" > .env
          echo "MONGO_DB=${{ secrets.VARIANT_MONGO_DB }}" >> .env

      - name: Instalar dependencias
        working-directory: productos/product-variant-service
        run: |
          docker run --rm -v $(pwd):/app -w /app php:8.2-cli \
          bash -c "apt-get update && apt-get install -y unzip git && curl -sS https://getcomposer.org/installer | php && php composer.phar install"
