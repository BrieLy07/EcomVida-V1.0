name: CI - Brand Service

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.BRAND_DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.BRAND_DB_NAME }}
        ports:
          - 3311:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Crear archivo .env
        working-directory: productos/brand-service
        run: |
          echo "DB_HOST=localhost" > .env
          echo "DB_PORT=3311" >> .env
          echo "DB_USER=${{ secrets.BRAND_DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.BRAND_DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.BRAND_DB_NAME }}" >> .env

      - name: Dar permisos a mvnw
        working-directory: productos/brand-service
        run: chmod +x mvnw

      - name: Construir y ejecutar prueba básica
        working-directory: productos/brand-service
        run: ./mvnw clean package -DskipTests
