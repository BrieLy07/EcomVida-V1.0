name: CI - Order-Tracking-Service

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      - name: Build and Test
        working-directory: pedidos/order-tracking-service
        run: |
          go mod tidy
          go build -o tracking-app main.go

      - name: Docker Build
        working-directory: pedidos/order-tracking-service
        run: docker build -t order-tracking-service .
