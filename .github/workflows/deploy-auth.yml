name: Despliegue EcomVida Auth Services

on:
  push:
    branches:
      - test2.0

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Desplegar en EC2 vía SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AUTH_EC2_HOST }}
        username: ${{ secrets.AUTH_EC2_USER }}
        key: ${{ secrets.AUTH_EC2_SSH_KEY }}
        script: |
          # Elimina contenedores antiguos (si existen)
          docker rm -f auth-backend || true
          docker rm -f auth-frontend || true

          # Clona el repo solo si no existe, o actualiza si ya está
          cd ~/EcomVida-V1.0 || git clone https://github.com/BrieLy07/EcomVida-V1.0.git ~/EcomVida-V1.0
          cd ~/EcomVida-V1.0
          git fetch origin
          git checkout test2.0
          git pull origin test2.0

          # -----------------------------------
          # BACKEND: auth-service
          # -----------------------------------
          cd backend/autenticacion/auth-service
          docker build -t auth-backend .
          docker run -d --name auth-backend -p 3001:3001 --env-file .env auth-backend

          # -----------------------------------
          # FRONTEND: auth-front
          # -----------------------------------
          cd ~/EcomVida-V1.0/frontend/auth-front
          docker build -t auth-frontend .
          docker run -d --name auth-frontend -p 80:80 auth-frontend
