version: '3.8'

services:
  order-tracking-db:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - trackingnet

  order-tracking-api:
    build: .
    ports:
      - "8088:8088"
    env_file:
      - .env
    depends_on:
      - order-tracking-db
    networks:
      - trackingnet

networks:
  trackingnet:
