version: '3.8'

services:
  order-db:
    image: postgres:15
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "5434:5432"
    networks:
      - ordenet
    volumes:
      - orderdata:/var/lib/postgresql/data

  order-api:
    build: .
    ports:
      - "8087:8080"
    env_file:
      - .env
    depends_on:
      - order-db
    networks:
      - ordenet

networks:
  ordenet:

volumes:
  orderdata:
